name: runpod-worker-image

on:
  pull_request:
    paths:
      - "services/runpod-worker/**"
      - ".github/workflows/worker-image.yml"
  push:
    branches:
      - main
    tags:
      - "worker-v*"
    paths:
      - "services/runpod-worker/**"
      - ".github/workflows/worker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: runpod-worker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/runpod-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.16"
          enable-cache: false

      - name: Install CPU quality-gate environment
        run: uv sync --frozen --extra dev

      - name: Verify Python worker
        run: |
          uv run --no-sync ruff check src tests scripts
          uv run --no-sync pytest -q
          uv run --no-sync python -m compileall -q src scripts

      - name: Verify generated dependency locks
        run: |
          uv export --frozen --extra gpu --no-dev --no-emit-project \
            --output-file requirements.asr.lock
          git diff --exit-code -- requirements.asr.lock
          uv pip compile requirements.diarizer.in \
            --python-version 3.12 \
            --universal \
            --generate-hashes \
            --output-file requirements.diarizer.lock
          git diff --exit-code -- requirements.diarizer.lock

      - name: Verify shell and fake-worker startup contracts
        shell: bash
        env:
          MODEL_ID: infodeliverailab/qwen3-asr-ja-rlbr-context-fullft
          WORKER_ID: ci-worker
          ASR_BACKEND: fake
          DIARIZER_BACKEND: energy
          BOOTSTRAP_MODELS: "false"
          REQUIRE_WORKER_TICKET: "true"
          WORKER_ADMIN_SECRET: ci-admin-secret-at-least-32-characters
          WORKER_TICKET_SECRET: ci-ticket-secret-at-least-32-characters
          PORT: "18080"
        run: |
          bash -n scripts/entrypoint.sh scripts/run_all.sh
          MODELS_LOCK_PATH="$PWD/config/models.lock.json" \
            CATALOG_PATH="$PWD/config/not-present.json" \
            uv run --no-sync python scripts/preflight.py
          uv run --no-sync python scripts/bootstrap_server.py &
          bootstrap_pid=$!
          trap 'kill "$bootstrap_pid" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            curl --fail --silent http://127.0.0.1:18080/health >/dev/null && break
            sleep 0.1
          done
          curl --fail --silent http://127.0.0.1:18080/health >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            'http://127.0.0.1:18080/ready?model_id=infodeliverailab/qwen3-asr-ja-rlbr-context-fullft')" = "503"

      - name: Reclaim runner disk for the GPU image
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          # These preinstalled SDKs and the Actions tool cache are not used
          # after the Python quality gate. Removing only known runner-image
          # paths avoids a mutable third-party cleanup action.
          uv cache clean
          rm -rf -- .venv
          cleanup_paths=(
            /usr/local/lib/android
            /usr/share/dotnet
            /opt/ghc
            /usr/local/.ghcup
            /usr/local/share/boost
            /opt/hostedtoolcache
          )
          for path in "${cleanup_paths[@]}"; do
            if [[ -e "$path" ]]; then
              sudo rm -rf --one-file-system -- "$path"
            fi
          done
          sudo apt-get clean
          docker system prune --all --force --volumes
          available_kib="$(df --output=avail -k / | tail -n 1 | tr -d ' ')"
          required_kib="$((28 * 1024 * 1024))"
          df -h /
          if (( available_kib < required_kib )); then
            echo "At least 28 GiB of free disk is required for the production GPU image" >&2
            exit 1
          fi

      - name: Resolve lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/qwen3-asr-runpod-worker" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build lightweight worker contract image
        uses: docker/build-push-action@v6
        with:
          context: services/runpod-worker
          file: services/runpod-worker/Dockerfile
          target: smoke
          load: true
          tags: qwen3-asr-worker-smoke:${{ github.sha }}

      - name: Smoke the packaged worker contract
        shell: bash
        run: |
          container_id="$(docker run --detach --rm \
            --publish 18081:8000 \
            --env MODEL_ID=infodeliverailab/qwen3-asr-ja-rlbr-context-fullft \
            --env WORKER_ID=ci-container-worker \
            --env ASR_BACKEND=fake \
            --env DIARIZER_BACKEND=energy \
            --env BOOTSTRAP_MODELS=false \
            --env REQUIRE_WORKER_TICKET=true \
            --env WORKER_ADMIN_SECRET=ci-admin-secret-at-least-32-characters \
            --env WORKER_TICKET_SECRET=ci-ticket-secret-at-least-32-characters \
            qwen3-asr-worker-smoke:${{ github.sha }})"
          trap 'docker stop "$container_id" >/dev/null 2>&1 || true' EXIT
          for _ in {1..120}; do
            if curl --fail --silent http://127.0.0.1:18081/ready \
              | grep --quiet '"status":"ready"'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "$container_id" \
              | grep --quiet true; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 0.5
          done
          docker logs "$container_id"
          exit 1

      - name: Reclaim smoke image space
        shell: bash
        run: |
          docker image rm --force qwen3-asr-worker-smoke:${{ github.sha }}
          docker buildx prune --all --force
          docker system prune --all --force --volumes
          df -h /

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build production worker image without loading it
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: services/runpod-worker
          file: services/runpod-worker/Dockerfile
          target: production
          platforms: linux/amd64
          outputs: type=cacheonly
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runpod-worker-production

      - name: Build and publish production worker image
        if: github.event_name != 'pull_request'
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: services/runpod-worker
          file: services/runpod-worker/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runpod-worker-production
          cache-to: type=gha,scope=runpod-worker-production,mode=min,ignore-error=true
          provenance: true
          sbom: true

      - name: Publish immutable image reference
        if: github.event_name != 'pull_request'
        shell: bash
        run: echo "${{ steps.image.outputs.name }}@${{ steps.publish.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
